<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/github-markdown.css">
    <title>get-music · admin</title>
    <style>
        body { max-width: 760px; margin: 32px auto; padding: 0 16px; font-family: system-ui, sans-serif; }
        .bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
        table { border-collapse: collapse; width: 100%; margin-top: 16px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
        button { cursor: pointer; }
        .danger { color: #c5221f; }
        form.add { margin-top: 24px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        input[type=email] { padding: 6px 8px; font-size: 15px; min-width: 260px; }
        #error { color: #c5221f; margin-top: 8px; }
        .tag { font-size: 12px; background: #e8f0fe; color: #1a73e8; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>

<body>
    <div class="bar">
        <h2>Admin · allowed users</h2>
        <a href="/">[back to app]</a>
    </div>

    <div id="error"></div>
    <table>
        <thead>
            <tr><th>Email</th><th>Admin</th><th>Added by</th><th></th></tr>
        </thead>
        <tbody id="user-rows"></tbody>
    </table>

    <form class="add" onsubmit="addUser(event)">
        <input type="email" id="new-email" placeholder="email to allow" required>
        <label><input type="checkbox" id="new-admin"> admin</label>
        <button type="submit">Add user</button>
    </form>

    <script>
        function showError(msg) { document.getElementById("error").textContent = msg || ""; }

        async function api(path, options) {
            const res = await fetch(path, options);
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);
            return data;
        }

        function render(users) {
            const tbody = document.getElementById("user-rows");
            tbody.innerHTML = "";
            for (const u of users) {
                const tr = document.createElement("tr");
                const protectedTag = u.protected ? ' <span class="tag">bootstrap</span>' : "";
                tr.innerHTML = `
                    <td>${u.email}${protectedTag}</td>
                    <td>${u.isAdmin ? "yes" : "no"}</td>
                    <td>${u.addedBy || "—"}</td>
                    <td></td>`;
                const actions = tr.children[3];
                if (!u.protected) {
                    const toggle = document.createElement("button");
                    toggle.textContent = u.isAdmin ? "revoke admin" : "make admin";
                    toggle.onclick = () => setAdmin(u.email, !u.isAdmin);
                    const remove = document.createElement("button");
                    remove.textContent = "remove";
                    remove.className = "danger";
                    remove.onclick = () => removeUser(u.email);
                    actions.append(toggle, document.createTextNode(" "), remove);
                }
                tbody.appendChild(tr);
            }
        }

        async function load() {
            try { render((await api("/admin/api/users")).users); showError(); }
            catch (e) { showError(e.message); }
        }

        async function addUser(event) {
            event.preventDefault();
            const email = document.getElementById("new-email").value.trim();
            const isAdmin = document.getElementById("new-admin").checked;
            try {
                const body = new URLSearchParams({ email, isAdmin: isAdmin ? "true" : "false" });
                render((await api("/admin/api/users", { method: "POST", body })).users);
                document.getElementById("new-email").value = "";
                document.getElementById("new-admin").checked = false;
                showError();
            } catch (e) { showError(e.message); }
        }

        async function removeUser(email) {
            if (!confirm(`Remove ${email}?`)) return;
            try { render((await api(`/admin/api/users/${encodeURIComponent(email)}`, { method: "DELETE" })).users); showError(); }
            catch (e) { showError(e.message); }
        }

        async function setAdmin(email, makeAdmin) {
            try {
                const body = new URLSearchParams({ isAdmin: makeAdmin ? "true" : "false" });
                render((await api(`/admin/api/users/${encodeURIComponent(email)}/admin`, { method: "POST", body })).users);
                showError();
            } catch (e) { showError(e.message); }
        }

        load();
    </script>
</body>

</html>
