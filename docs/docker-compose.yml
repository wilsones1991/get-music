# Runs on the MAC MINI (not the VPS). This mirrors the working live stack at
# ~/qbt-vpn/docker-compose.yml (which holds the real Mullvad key and is kept out
# of git). qBittorrent shares gluetun's network, so ALL torrent traffic goes
# through Mullvad and dies instantly if the tunnel drops (killswitch).
#
# Gotchas baked in from the real setup:
#  - WIREGUARD_ADDRESSES must be IPv4-only here (the Colima/Docker net has no
#    IPv6); drop the IPv6 part Mullvad includes after the comma.
#  - SERVER_CITIES uses gluetun's exact name, e.g. "San Jose CA" (not "San Jose").
#  - Web UI is published on host 8090 (8080 was already in use on the mini).
#  - gluetun's control server now requires auth; gluetun-auth/config.toml opens
#    just the read-only publicip route for the app's VPN-status check.
#  - On Colima, mount the drive by sharing /Volumes (a mount whose path contains
#    a space, like "/Volumes/Mac Seagate", fails to attach via virtiofs).

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      # Opens only "GET /v1/publicip/ip" without auth (see gluetun-auth/config.toml).
      - ./gluetun-auth:/gluetun/auth
    ports:
      - "8090:8080" # qBittorrent Web UI (host 8090 -> container 8080)
      - "8000:8000" # gluetun control server (VPN status check)
    environment:
      VPN_SERVICE_PROVIDER: mullvad
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: "<from any Mullvad .conf — same in all of them>"
      WIREGUARD_ADDRESSES: "<IPv4 only, e.g. 10.69.x.x/32 — drop the IPv6>"
      SERVER_COUNTRIES: "USA"
      SERVER_CITIES: "San Jose CA"
      FIREWALL: "on" # killswitch
      HTTP_CONTROL_SERVER_ADDRESS: ":8000"
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun" # no network of its own — VPN only
    depends_on:
      - gluetun
    environment:
      PUID: "501" # `id -u`
      PGID: "20" # `id -g`
      TZ: "America/Los_Angeles"
      WEBUI_PORT: "8080"
    volumes:
      - qbt-config:/config
      # Download straight into the existing Jellyfin library roots.
      - type: bind
        source: "/Volumes/Mac Seagate/jellyfin-movies"
        target: /downloads/movies
      - type: bind
        source: "/Volumes/Mac Seagate/jellyfin-tv"
        target: /downloads/tvshows
      - type: bind
        source: "/Volumes/Mac Seagate/jellyfin-music"
        target: /downloads/music
      - type: bind
        source: "/Volumes/Mac Seagate/downloads"
        target: /downloads/general
      # Incomplete downloads kept out of the library until finished.
      - type: bind
        source: "/Volumes/Mac Seagate/.qbt-incomplete"
        target: /incomplete
    restart: unless-stopped

volumes:
  qbt-config:
